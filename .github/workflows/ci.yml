name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./front
    steps:
    - uses: actions/checkout@v7
    
    - name: Use Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '24'
        
    - name: Install dependencies
      run: if [ -f package.json ]; then npm ci || npm install; else echo "No package.json found; skipping dependency installation"; fi
      
    # - name: Run tests
    #   run: npm test
