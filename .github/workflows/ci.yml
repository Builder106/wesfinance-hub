name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./front
    steps:
    - uses: actions/checkout@v7
    
    - name: Use Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '24'
        
    - name: Install dependencies
      run: npm ci || npm install
      
    # - name: Run tests
    #   run: npm test
